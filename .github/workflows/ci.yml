name: CI

on: { push: { branches-ignore: wip/** } }

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install deps
        run: bun i

      - name: Lint
        run: bun lint

      - name: Build
        run: bun build:prod